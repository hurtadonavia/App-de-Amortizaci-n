<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculadora de Amortización</title>

    <link rel="stylesheet" href="estilos.css">

</head>

<body>

    <div class="container">

        <h1>💰 Calculadora de Amortización</h1>

        <p class="descripcion">
            Calcula la cuota mensual de un préstamo y consulta la tabla de amortización.
        </p>

        <div class="formulario">

            <label>Monto del préstamo</label>
            <input type="number" id="monto" placeholder="Ejemplo: 10000">

            <label>Tasa de interés anual (%)</label>
            <input type="number" id="interes" placeholder="Ejemplo: 12">

            <label>Plazo (meses)</label>
            <input type="number" id="meses" placeholder="Ejemplo: 36">

            <button onclick="calcular()">
                Calcular
            </button>

        </div>

        <div id="resultado"></div>

        <table id="tabla"></table>

    </div>

    <script src="script.js"></script>

</body>

</html>
